<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speciale Design</title>
    <link rel="stylesheet" href="css/master.css">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<body>
    <!-- Start settings box -->
     <div class="setting-box">

            <div class="option-box-colors">
                <h4>Colors</h4>
                <ul class="colors-list">
                    <li data-color="#75f452"></li>
                    <li data-color="#f452b1"></li>
                    <li data-color="#684aba"></li>
                    <li data-color="#b3ba4a"></li>
                </ul>
            </div>
            <!-- <div class="option-box-backg">
                <h4>Colors</h4>
                <div class="random-background">
                    <span class="yes active"></span>
                    <span class="no"></span>
                </div>
                
            </div> -->
        </div>
     </div>
     <!-- End settings box -->
    <!-- Start Landing Page -->
    <div class="landing-page">
        <div class="overlay"></div>
        <div class="header-aria">
            <div class="logo">WebSite.</div>
            <ul class="links">
                <li id="active" >About</li>
                <li>Service</li>
                <li>Products</li>
                <li>Contact</li>
            </ul>
        </div>
        <div class="introduction text">
            <h2>We Are <span>Creative</span> Agency</h2>
            <p>Our website is your gateway to the professional internet world, where we transform your vision into an attractive and functional digital reality through comprehensive website design services.

    </div>
